name: Build and deploy bdq site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas pyyaml rdflib markdown pygments

      - name: Build tg2 review documents
        working-directory: tg2/_make_review
        shell: bash
        run: |
          set -euo pipefail
          chmod +x do_build.sh
          ./do_build.sh

      - name: Assemble site source tree
        shell: bash
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site/assets/css site/assets/js site/assets/img
          cp CNAME site/CNAME

          # Root README becomes site root
          cp README.md site/README.md

          # Redirect /bdq/ to /draft/ while in draft.
          mkdir -p site/bdq
          cat > site/bdq/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/draft/">
            <link rel="canonical" href="/draft/">
            <script>window.location.replace("/draft/");</script>
            <title>Redirecting…</title>
          </head>
          <body>
            <p>Redirecting to <a href="/draft/">/draft/</a>.</p>
          </body>
          </html>
          EOF

          # Top-level tg directories, including their README.md files
          rsync -a tg1/ site/tg1/
          rsync -a tg2/ site/tg2/ \
            --exclude '_build_qrg/' \
            --exclude '_build_review/' \
            --exclude '_make_review/' \
            --exclude '_review/'
          rsync -a tg3/ site/tg3/
          rsync -a tg4/ site/tg4/

          # Draft publication area from generated tg2 review docs
          rsync -a tg2/_review/ site/draft/

          # Alternate HTML publication path
          rsync -a terms/bdqtest/ site/draft/docs/terms/bdqtest-html/

          # Provide the Turtle serialization of the owl ontology with a .ttl extension for better content-type handling
          if [ -f site/draft/vocabulary/bdqffdq.owl ]; then
              cp site/draft/vocabulary/bdqffdq.owl site/draft/vocabulary/bdqffdq.ttl
          fi

          # Static site resources
          cp _site_resources/assets/site.css site/assets/css/site.css
          cp _site_resources/assets/toc.js site/assets/js/toc.js
          cp _site_resources/assets/tdwg-logo-short.svg site/assets/img/tdwg-logo-short.svg

      - name: Render static site
        shell: bash
        run: |
          set -euo pipefail
          python _site_resources/render_site.py \
            --site-root site \
            --template _site_resources/templates/page.html

      - name: Verify built output
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/tg1/index.html
          test -f site/tg2/index.html
          test -f site/tg3/index.html
          test -f site/tg4/index.html
          test -f site/draft/index.html
          test -f site/bdq/index.html
          test -f site/assets/img/tdwg-logo-short.svg
          test -f site/draft/vocabulary/bdqffdq.ttl
          test -f site/CNAME
          find site -maxdepth 5 | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
