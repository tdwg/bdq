name: Build and deploy mapped Pages site with Jekyll

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas pyyaml rdflib

      - name: Install Jekyll and Cayman theme
        shell: bash
        run: |
          set -euo pipefail
          gem install jekyll bundler jekyll-theme-cayman

      - name: Build tg2 review documents
        working-directory: tg2/_make_review
        shell: bash
        run: |
          set -euo pipefail
          chmod +x do_build.sh
          ./do_build.sh

      - name: Assemble Jekyll source tree
        shell: bash
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site
          mkdir -p site/draft
          mkdir -p site/draft/docs/terms
          mkdir -p site/tg1
          mkdir -p site/tg2
          mkdir -p site/tg3
          mkdir -p site/tg4
          mkdir -p site/_layouts
          mkdir -p site/_includes
          mkdir -p site/assets/css

          cp CNAME site/CNAME

          # Keep README available as a source artifact
          cp README.md site/README.md

          # Explicit homepage so root definitely exists
          cat > site/index.html <<'EOF'
          ---
          layout: default
          title: Biodiversity Data Quality (BDQ)
          ---
          EOF
          cat README.md >> site/index.html

          rsync -a tg2/_review/ site/draft/
          rsync -a terms/bdqtest/ site/draft/docs/terms/bdqtest-html/
          rsync -a tg1/ site/tg1/
          rsync -a tg3/ site/tg3/
          rsync -a tg4/ site/tg4/
          rsync -a \
            --exclude '_build_qrg/' \
            --exclude '_build_review/' \
            --exclude '_make_review/' \
            --exclude '_review/' \
            tg2/ site/tg2/

          printf '%s\n' \
            'theme: jekyll-theme-cayman' \
            'title: Biodiversity Data Quality (BDQ)' \
            'description: Draft and working materials for the TDWG Biodiversity Data Quality standard' \
            'markdown: kramdown' \
            'kramdown:' \
            '  input: GFM' \
            'plugins: []' \
            'exclude:' \
            '  - README.md' \
            'defaults:' \
            '  - scope:' \
            '      path: ""' \
            '      type: "pages"' \
            '    values:' \
            '      layout: default' \
            '  - scope:' \
            '      path: "draft"' \
            '      type: "pages"' \
            '    values:' \
            '      layout: docs' \
            '      review_status: under-review' \
            '      show_toc: true' \
            '      section: draft' \
            '  - scope:' \
            '      path: "tg1"' \
            '      type: "pages"' \
            '    values:' \
            '      layout: docs' \
            '      show_toc: true' \
            '      section: tg1' \
            '  - scope:' \
            '      path: "tg2"' \
            '      type: "pages"' \
            '    values:' \
            '      layout: docs' \
            '      show_toc: true' \
            '      section: tg2' \
            '  - scope:' \
            '      path: "tg3"' \
            '      type: "pages"' \
            '    values:' \
            '      layout: docs' \
            '      show_toc: true' \
            '      section: tg3' \
            '  - scope:' \
            '      path: "tg4"' \
            '      type: "pages"' \
            '    values:' \
            '      layout: docs' \
            '      show_toc: true' \
            '      section: tg4' \
            > site/_config.yml

          cat > site/_layouts/docs.html <<'EOF'
          ---
          layout: default
          ---
          <header class="doc-header">
            {% include review_banner.html %}
            {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
            {% endif %}
          </header>

          <div class="doc-shell">
            {% if page.show_toc %}
            <aside class="doc-sidebar">
              {% include toc.html %}
            </aside>
            {% endif %}

            <main class="doc-content">
              {{ content }}
            </main>
          </div>
          EOF

          cat > site/_includes/review_banner.html <<'EOF'
          {% if page.review_status == "under-review" %}
          <div class="review-banner" role="note" aria-label="Under review">
            Under Review
          </div>
          {% endif %}
          EOF

          cat > site/_includes/toc.html <<'EOF'
          <nav class="page-toc" aria-label="On this page">
            <h2>On this page</h2>
            <ul id="toc-list"></ul>
            <p id="toc-empty" class="toc-empty" hidden>No headings available.</p>
          </nav>
          <script>
          document.addEventListener("DOMContentLoaded", function () {
            var toc = document.getElementById("toc-list");
            var empty = document.getElementById("toc-empty");
            if (!toc || !empty) return;

            var content = document.querySelector(".doc-content");
            if (!content) return;

            var headings = content.querySelectorAll("h2[id], h3[id]");
            headings.forEach(function(h) {
              var li = document.createElement("li");
              if (h.tagName.toLowerCase() === "h3") li.className = "toc-h3";
              var a = document.createElement("a");
              a.href = "#" + h.id;
              a.textContent = h.textContent;
              li.appendChild(a);
              toc.appendChild(li);
            });

            if (!toc.children.length) {
              empty.hidden = false;
            }
          });
          </script>
          EOF

          cat > site/assets/css/style.scss <<'EOF'
          ---
          ---

          @import "{{ site.theme }}";

          .review-banner {
            display: inline-block;
            margin: 0 0 1rem 0;
            padding: 0.5rem 0.85rem;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #fff;
            background: #c0392b;
            border-radius: 0.35rem;
          }

          .doc-header {
            margin-bottom: 1.5rem;
          }

          .page-description {
            margin-top: 0;
            margin-bottom: 0;
            color: #586069;
            font-size: 1.1rem;
          }

          .doc-shell {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 2rem;
            align-items: start;
          }

          .doc-sidebar {
            position: sticky;
            top: 1rem;
          }

          .page-toc {
            padding: 1rem;
            border: 1px solid #d0d7de;
            border-radius: 0.5rem;
            background: #f6f8fa;
          }

          .page-toc h2 {
            margin-top: 0;
            font-size: 1rem;
          }

          .page-toc ul {
            margin: 0;
            padding-left: 1.1rem;
          }

          .page-toc li {
            margin: 0.35rem 0;
          }

          .page-toc li.toc-h3 {
            margin-left: 0.75rem;
            font-size: 0.95rem;
          }

          .toc-empty {
            color: #6a737d;
            font-size: 0.95rem;
            margin: 0;
          }

          .doc-content {
            min-width: 0;
          }

          @media (max-width: 960px) {
            .doc-shell {
              grid-template-columns: 1fr;
            }

            .doc-sidebar {
              position: static;
              order: -1;
            }
          }
          EOF

      - name: Rewrite internal markdown links to html
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re
          from urllib.parse import urlsplit, urlunsplit

          site = Path("site").resolve()

          def rewrite_target(url: str) -> str:
              parts = urlsplit(url)
              if parts.scheme or parts.netloc:
                  return url
              if not parts.path:
                  return url

              path = parts.path

              if path.endswith("README.md"):
                  new_path = path[:-9] + "index.html"
              elif path.endswith("index.md"):
                  new_path = path[:-3] + "html"
              elif path.endswith(".md"):
                  new_path = path[:-3] + "html"
              else:
                  new_path = path

              return urlunsplit(("", "", new_path, parts.query, parts.fragment))

          pattern = re.compile(r'(!?\[[^\]]*\]\()([^)]+)(\))')

          for md_path in site.rglob("*.md"):
              text = md_path.read_text(encoding="utf-8")

              def repl(match):
                  prefix, target, suffix = match.groups()
                  target = target.strip()
                  if target.startswith("<") and target.endswith(">"):
                      inner = target[1:-1].strip()
                      return f"{prefix}<{rewrite_target(inner)}>{suffix}"
                  return f"{prefix}{rewrite_target(target)}{suffix}"

              md_path.write_text(pattern.sub(repl, text), encoding="utf-8")
          PY

      - name: Build site with Jekyll
        shell: bash
        run: |
          set -euo pipefail
          jekyll build --source site --destination site/_site

      - name: Verify built output
        shell: bash
        run: |
          set -euo pipefail
          test -f site/_site/index.html
          test -f site/_site/CNAME
          find site/_site -maxdepth 4 | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4