<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <link rel="stylesheet" href="/assets/css/site.css">
  <link rel="stylesheet" href="/assets/css/pygments.css">
</head>
<body>
  <!--
    Skip link: visually hidden until focused by keyboard.
    Must be the first focusable element in <body>.
    tabindex="-1" on <main> lets browsers move focus there on activation.
  -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="page-header" role="banner">
    <div class="page-header-inner">
      <a class="site-logo-link" href="{{SITE_HEADER_LINK}}" aria-label="TDWG home for this section">
        <img class="site-logo" src="/assets/img/TDWG-Logo_horizontal-white.svg" alt="TDWG logo">
      </a>
      <div class="page-header-text">
        <h1 class="project-name">
          <a class="project-name-link" href="{{SITE_HEADER_LINK}}">{{SITE_HEADER_TITLE}}</a>
        </h1>
        <p class="project-tagline">{{SITE_HEADER_TAGLINE}}</p>
      </div>
    </div>
  </header>

  <!--
    {{REVIEW_BANNER}} is either a complete <header class="doc-header">...</header>
    for draft pages, or an empty string for other pages, so no empty landmark
    element is left behind on non-draft pages.
    tabindex="-1" makes <main> focusable by the skip link without entering tab order.
  -->
  <main class="main-content" id="main-content" tabindex="-1" role="main">
    {{REVIEW_BANNER}}
    <div class="doc-shell">
      {{TOC_SIDEBAR}}
      <article class="doc-content">
        {{BODY_HTML}}
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <a href="https://tdwg.org/">Biodiversity Information Standards (TDWG)</a> |  <a href="https://bdq.tdwg.org/">Biodiversity Data Quality Interest Group</a> | on Github: <a href="https://github.com/tdwg/bdq/">tdwg/bdq</a>
  </footer>

  <noscript>
    <style>
      /*
        Without JS:
        — the sidebar toggle button does nothing; hide it so it is not
          a confusing dead control.
        — toc.js cannot open #sidebar-inner on mobile; force it visible
          so the TOC is always reachable on narrow viewports.
        — toc.js cannot manage #toc-empty; always hide it.
      */
      .sidebar-toggle { display: none  !important; }
      #sidebar-inner  { display: block !important; }
      #toc-empty      { display: none  !important; }
    </style>
  </noscript>

  <script src="/assets/js/toc.js"></script>
</body>
</html>
